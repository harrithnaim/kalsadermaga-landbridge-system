{% extends "base.html" %}
{% block title %}Login — Kalsa Dermaga Landbridge{% endblock %}
{% block content %}
<div style="display:flex; align-items:center; justify-content:center; min-height:65vh;">
  <form method="POST" style="background:var(--panel); padding:32px; border-radius:8px; width:280px; max-width:100%;">
    <h1 style="font-size:18px; margin-bottom:20px;">Kalsa Dermaga Landbridge</h1>
    {% if error %}<div class="hazmat" style="font-size:13px; margin-bottom:12px;">{{ error }}</div>{% endif %}
    <label style="display:block; font-size:13px; margin-bottom:6px; color:var(--text-dim);">Username</label>
    <input type="text" name="username" required autofocus style="width:100%; margin-bottom:16px;">
    <label style="display:block; font-size:13px; margin-bottom:6px; color:var(--text-dim);">Password</label>
    <input type="password" name="password" required style="width:100%; margin-bottom:16px;">
    <button type="submit" style="width:100%; justify-content:center;">Log in</button>
  </form>
</div>
{% endblock %}
